<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, interactive-widget=resizes-content, viewport-fit=cover">
  <meta name="description" content="Unix13 Atom - Time Converter app from 13 digit unix to Date ISO.">
  <meta property="og:title" content="Unix13 Atom">
  <meta property="og:description" content="Unix13 Atom Time Converter App from 13 Digit unix epoch to Date ISO.">
  <meta property="og:type" content="website">

  <meta name="twitter:description" content="Unix13 Atom Time Converter App from 13 Digit unix epoch to Date ISO.">

  <meta name="theme-color" content="#0f0c1d">
	<link rel="icon" type="image/png" href="favicon.png">
    <title>Unix13 Atom</title>
<style>
    :root {
        --bg: #0f0c1d; 
        --card: #1b172e; 
        --accent: #b794f4;
        --accent-glow: rgba(124, 77, 255, 0.6);
				--button: #7c4dff;
        --error: #121212; 
        --text: #e1e1e6; 
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
        font-family: -apple-system, system-ui, sans-serif; 
        background: var(--bg); color: var(--text); 
        margin: 0; padding: 0;
        display: flex; flex-direction: column;
        height: 100dvh;
        overflow: hidden;
    }
    
    main { 
        flex: 1; overflow-y: auto; 
        display: flex; flex-direction: column; 
        justify-content: center; align-items: center; 
        padding: 20px;
        -webkit-overflow-scrolling: touch;
    }

    .output-box { 
        background: var(--card); padding: 24px; border-radius: 16px;
        width: 100%; max-width: 360px;
        border: 1px solid #2d2845;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        margin-bottom: 20px;
    }

    .label { font-size: 10px; color: #948fb5; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
    .iso-text { font-family: 'Courier New', monospace; font-variant-numeric: tabular-nums; font-size: 1.1rem; color: var(--accent); margin-bottom: 16px; word-break: break-all; font-weight: bold; text-shadow: 0 0 8px var(--accent-glow); }
    
    .local-text { font-size: 0.9rem; color: #b7b4d3; border-top: 1px solid #2d2845; padding-top: 12px; line-height: 1.4; }

    footer {
        margin: 0 auto;
        padding: 12px 16px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
        z-index: 10;
    }

    .input-zone { display: flex; gap: 10px; align-items: center; max-width: 480px; margin: 0 auto; }

    input {
        flex: 1; background: #25213b; border: 1px solid transparent;
        padding: 14px 18px; border-radius: 28px; color: var(--text); 
        font-size: 16px; 
        outline: none; transition: 0.2s;
    }
    
    input:focus { border-color: var(--accent); background: #2a2545; }
    input.invalid { border-color: var(--error); }

    button { 
        background: var(--button); border: none; width: 48px; height: 48px; 
        border-radius: 50%; cursor: pointer;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0; user-select: none;
        box-shadow: 0 4px 12px rgba(124, 77, 255, 0.4);
    }
    
    button:active { transform: scale(0.9); opacity: 0.9; transform: rotate(45deg); }
</style>


</head>
<body>

    <main>
        <div class="output-box">
            <div class="label">ISO 8601 (UTC)</div>
            <div id="iso" class="iso-text">0000-00-00T00:00:00.000Z</div>
            
            <div class="label">Local Matrix (WIB)</div>
            <div id="loc" class="local-text">Input 13 digits to start...</div>
        </div>
    </main>

    <footer>
        <div class="input-zone">

            <input id="ui" placeholder="13 digits unix ts..." maxlength="13" inputmode="numeric" spellcheck="false" autocomplete="off" aria-label="Type">
            <!--button id="ub" aria-label="convert time">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
  <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.2 14.2L11 13V7h1.5v5.2l4.5 2.6-.8 1.4z"></path>
</svg>
            </button -->
        </div>
    </footer>

    <script>
(() => {
    "use strict";

    const $ = (id) => document.getElementById(id);
    const elIn = $('ui'), elIso = $('iso'), elLoc = $('loc'), btn = $('ub');

    const df = new Intl.DateTimeFormat('id-ID', {
        weekday: 'short', day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short'
    });

    const convert = () => {
        const raw = elIn.value;
        if (raw.length !== 13) {
            elIn.classList.add('invalid');
            return;
        }

        const d = new Date(+raw);
        if (isNaN(d.getTime())) {
            elLoc.textContent = "CORRUPT_TIMESTAMP";
            return;
        }

        elIso.textContent = d.toISOString();
        elLoc.textContent = df.format(d);
        elIn.classList.remove('invalid');
        elIn.blur(); 
    };

    //btn.onclick = convert;
    

    elIn.addEventListener('input', (e) => {
        const val = e.target.value;
        const sanitized = val.replace(/\D/g, '');
        

        if (val !== sanitized) {
            e.target.value = sanitized;
        }
        
        elIn.classList.remove('invalid');
        

        if (sanitized.length === 13) convert(); 
    });

    elIn.onkeydown = (e) => {
        if (e.key === 'Enter') convert();
    };

})();

    </script>
</body>
</html>
